services:
  oracle:
    extends:
      file: deps.yaml
      service: oracle
    container_name: workmap-oracle

  keycloak:
    extends:
      file: deps.yaml
      service: keycloak
    container_name: workmap-keycloak

  puppet:
    extends:
      file: deps.yaml
      service: puppet
    container_name: workmap-puppet

  workmap:
    hostname: workmap
    container_name: workmap-dev
    ports:
      - "8443:8443"
      - "8080:8080"
      - "9990:9990"